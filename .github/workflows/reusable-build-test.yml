on:
  workflow_call:
    inputs:
      solution-path:
        type: string
        description: 'The relative path to the .sln file (default: current directory)'
        required: false
        default: '.'
      solution-name:
        type: string
        description: 'The name of the solution file (e.g., MyApp.sln)'
        required: true
      report-coverage-title:
        type: string
        description: 'A title for the coverage report (default: Reporte de Cobertura)'
        required: false
        default: 'Reporte de Cobertura'

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  FULL_SOLUTION_PATH: ${{ inputs.solution-path }}/${{ inputs.solution-name }}
  TEST_RESULTS_DIR: ${{ github.workspace }}/test-results
  COVERAGE_REPORT_DIR: ${{ github.workspace }}/coverage-report

jobs:
  build:
    name: Build
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Cache NuGet ─────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # ── 3. Validate solution file ──────────────────────────
      - name: Validate solution file
        shell: bash
        run: |
          if [ ! -f "${{ env.FULL_SOLUTION_PATH }}" ]; then
            echo "::error file=${{ env.FULL_SOLUTION_PATH }}::Solution file not found: ${{ env.FULL_SOLUTION_PATH }}"
            exit 1
          fi
          echo "✅ Solution found: ${{ env.FULL_SOLUTION_PATH }}"

      # ── 4. Restore dependencies ────────────────────────────
      - name: Install dependencies
        run: dotnet restore "${{ env.FULL_SOLUTION_PATH }}"

      # ── 5. Build ───────────────────────────────────────────
      - name: Run build
        run: dotnet build "${{ env.FULL_SOLUTION_PATH }}" --configuration Release --no-restore

      # ── 6. Job summary ─────────────────────────────────────
      - name: Write job summary
        if: always()
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          {
            echo "## ${ICON} Build"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Solution** | \`${{ env.FULL_SOLUTION_PATH }}\` |"
            echo "| **Status** | ${STATUS} |"
            echo "| **Runner** | \`${{ runner.os }}\` |"
            echo "| **Triggered by** | \`${{ github.event_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── 7. PR comment — failure ────────────────────────────
      - name: Comment on PR if Build Fails
        if: failure() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-test
          recreate: true
          message: |
            ## ❌ Build failed

            The build failed. Please fix the issues before pushing again.

            Check the full details in the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

  test:
    name: Test
    needs: [build]
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Cache NuGet ─────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # ── 3. Check for source code files ────────────────────
      - name: Check for Source Code Files
        run: |
          SOURCE_FILES=$(find ${{ inputs.solution-path }} -type f -name "*.cs" \
            ! -name "Program.cs" \
            ! -name "*DbContext.cs" \
            ! -name "*Context.cs" \
            ! -path "*/Migrations/*")
          
          if [[ -n "$SOURCE_FILES" ]]; then
            echo "🔍 Source code files found, tests will be required."
            echo "required_tests=true" >> $GITHUB_ENV
          else
            echo "✅ No significant source code found, tests are not required."
            echo "required_tests=false" >> $GITHUB_ENV
          fi

      # ── 4. Validate coverlet.collector ────────────────────
      - name: Validate Coverlet Collector in Test Projects
        if: env.required_tests == 'true'
        run: |
          TEST_PROJECTS=$(find ${{ github.workspace }} -name "*.csproj" | xargs grep -l "MSTest\|xunit\|NUnit" 2>/dev/null | sort -u)

          if [[ -z "$TEST_PROJECTS" ]]; then
            echo "⚠️ No test projects found."
            exit 0
          fi

          for proj in $TEST_PROJECTS; do
            if ! grep -q "coverlet.collector" "$proj"; then
              echo "::error file=$proj::Missing coverlet.collector in $proj"
              echo "$proj" >> /tmp/missing_coverlet_projects_raw.txt
            else
              echo "✅ coverlet.collector found in: $proj"
            fi
          done

          if [[ -f /tmp/missing_coverlet_projects_raw.txt ]]; then
            sort -u /tmp/missing_coverlet_projects_raw.txt > /tmp/missing_coverlet_projects.txt
            echo "COVERLET_FAILED=true" >> $GITHUB_ENV
            exit 1
          else
            echo "COVERLET_FAILED=false" >> $GITHUB_ENV
            TEST_PROJECT_COUNT=$(echo "$TEST_PROJECTS" | wc -l)
            echo "TEST_PROJECT_COUNT=$TEST_PROJECT_COUNT" >> $GITHUB_ENV
          fi

      # ── 4b. Job summary — missing coverlet ────────────────
      - name: Report Missing Coverlet Collector
        if: failure() && env.COVERLET_FAILED == 'true'
        run: |
          {
            echo "## ❌ Missing \`coverlet.collector\` in test projects"
            echo ""
            echo "The following test projects are missing the \`coverlet.collector\` package,"
            echo "which is required for code coverage collection:"
            echo ""
            while IFS= read -r proj; do
              echo "- \`$proj\`"
            done < /tmp/missing_coverlet_projects.txt
            echo ""
            echo "### 🔧 How to fix"
            echo ""
            echo "Add the following \`PackageReference\` to each affected \`.csproj\`:"
            echo ""
            echo '```xml'
            echo '<PackageReference Include="coverlet.collector" Version="6.0.2">'
            echo '  <PrivateAssets>all</PrivateAssets>'
            echo '  <IncludeAssets>runtime; build; native; contentfiles; analyzers; buildtransitive</IncludeAssets>'
            echo '</PackageReference>'
            echo '```'
            echo ""
            echo "📚 See the full guide on setting up a test project correctly:"
            echo "[create-unit-test-project.md — Referenciar la Lógica de Negocio en el Proyecto de Pruebas](https://github.com/IngSoft-DA2/DA2-Tecnologia/blob/unit-testing/create-unit-test-project.md#-6-referenciar-la-l%C3%B3gica-de-negocio-en-el-proyecto-de-pruebas)"
            echo ""
            echo "Check the full details in the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          } > /tmp/coverlet-report.md
          cat /tmp/coverlet-report.md >> "$GITHUB_STEP_SUMMARY"

      # ── 4c. PR comment — missing coverlet ─────────────────
      - name: Comment on PR — missing coverlet.collector
        if: failure() && env.COVERLET_FAILED == 'true' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-test
          recreate: true
          path: '/tmp/coverlet-report.md'

      # ── 5. Find .runsettings ───────────────────────────────
      - name: Find .runsettings file
        run: |
          RUNSETTINGS_PATH=$(find ${{ github.workspace }} -name "*.runsettings" | head -1)
          if [[ -z "$RUNSETTINGS_PATH" ]]; then
            echo "⚠️ No .runsettings file found, proceeding without it."
            echo "RUNSETTINGS_PATH=" >> $GITHUB_ENV
          else
            echo "✅ Found .runsettings at: $RUNSETTINGS_PATH"
            echo "RUNSETTINGS_PATH=$RUNSETTINGS_PATH" >> $GITHUB_ENV
          fi

      # ── 6. Restore dependencies ───────────────────────────
      - name: Restore dependencies
        if: env.required_tests == 'true'
        run: dotnet restore "${{ env.FULL_SOLUTION_PATH }}"

      # ── 7. Run tests ───────────────────────────────────────
      - name: Generate Test Results and Coverage Reports
        if: env.required_tests == 'true'
        run: |
          SETTINGS_ARG=""
          if [[ -n "${{ env.RUNSETTINGS_PATH }}" ]]; then
            SETTINGS_ARG="--settings ${{ env.RUNSETTINGS_PATH }}"
          fi
          dotnet test "${{ env.FULL_SOLUTION_PATH }}" \
            --configuration Release \
            --no-restore \
            --verbosity normal \
            --logger "trx;LogFilePrefix=test-results" \
            --results-directory "${{ env.TEST_RESULTS_DIR }}" \
            --collect:"XPlat Code Coverage" \
            $SETTINGS_ARG

      # ── 8. Upload test results report ──────────────────────
      - name: Uploaded Results Report
        if: always() && env.required_tests == 'true'
        uses: dorny/test-reporter@v1
        with:
          name: Uploaded Results Report
          path: ${{ env.TEST_RESULTS_DIR }}/test-results*.trx
          reporter: dotnet-trx
          path-replace-backslashes: false
          list-suites: all
          list-tests: all
          max-annotations: 10
          fail-on-error: true
          fail-on-empty: true
          only-summary: false

      # ── 9. PR comment — tests failed ───────────────────────
      - name: Comment on PR if Tests Fail
        if: failure() && github.event_name == 'pull_request' && env.required_tests == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-test
          append: true
          message: |
            ## ❌ Tests failed

            One or more tests failed. Please fix the issues before pushing again.

            Check the full details in the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      # ── 10. Debug: coverage file sizes ────────────────────
      - name: Debug ReportGenerator Input
        if: env.required_tests == 'true'
        run: find ${{ env.TEST_RESULTS_DIR }} -name "coverage.cobertura.xml" | xargs wc -l

      # ── 11. Debug: coverage file contents ─────────────────
      - name: Debug Coverage XML Content
        if: env.required_tests == 'true'
        run: |
          find ${{ env.TEST_RESULTS_DIR }} -name "coverage.cobertura.xml" | while read f; do
            echo "=== $f ==="
            cat "$f"
            echo ""
          done

      # ── 12. Merge coverage reports ─────────────────────────
      - name: Join Coverage Reports
        if: env.required_tests == 'true'
        uses: danielpalme/ReportGenerator-GitHub-Action@5.3.9
        with:
          reports: '${{ env.TEST_RESULTS_DIR }}/**/coverage.cobertura.xml'
          targetdir: '${{ env.COVERAGE_REPORT_DIR }}'
          reporttypes: 'Html;Cobertura'
          verbosity: 'Verbose'
          tag: '${{ github.run_number }}_${{ github.run_id }}'
          title: '${{ inputs.report-coverage-title }}'

      # ── 12b. Validate coverage package count ──────────────
      - name: Validate Coverage Package Count
        if: env.required_tests == 'true'
        run: |
          COBERTURA_FILE="${{ env.COVERAGE_REPORT_DIR }}/Cobertura.xml"

          if [[ ! -f "$COBERTURA_FILE" ]]; then
            echo "❌ Cobertura.xml not found."
            exit 1
          fi

          PACKAGE_COUNT=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$COBERTURA_FILE')
          root = tree.getroot()
          print(len(root.findall('packages/package')))
          ")

          echo "📦 Test projects detected: ${{ env.TEST_PROJECT_COUNT }}"
          echo "📊 Packages in coverage report: $PACKAGE_COUNT"

          echo "PACKAGE_COUNT=$PACKAGE_COUNT" >> $GITHUB_ENV

          if [[ "$PACKAGE_COUNT" -ne "${{ env.TEST_PROJECT_COUNT }}" ]]; then
            echo "COVERAGE_COUNT_MISMATCH=true" >> $GITHUB_ENV
            exit 1
          else
            echo "COVERAGE_COUNT_MISMATCH=false" >> $GITHUB_ENV
            echo "✅ Package count matches: $PACKAGE_COUNT"
          fi

      # ── 12c. Job summary — package count mismatch ─────────
      - name: Report Coverage Package Count Mismatch
        if: failure() && env.COVERAGE_COUNT_MISMATCH == 'true'
        run: |
          {
            echo "## ⚠️ Coverage package count mismatch"
            echo ""
            echo "The number of packages in the coverage report does not match the number of test projects detected."
            echo ""
            echo "| | Count |"
            echo "|---|---|"
            echo "| **Test projects detected** | ${{ env.TEST_PROJECT_COUNT }} |"
            echo "| **Packages in coverage report** | ${{ env.PACKAGE_COUNT }} |"
            echo ""
            echo "This usually means one or more projects are not being instrumented correctly."
            echo "Check that all test projects have \`coverlet.collector\` and that the \`.runsettings\` exclusions are not too aggressive."
          } > /tmp/coverage-mismatch-report.md
          cat /tmp/coverage-mismatch-report.md >> "$GITHUB_STEP_SUMMARY"

      # ── 12d. PR comment — package count mismatch ──────────
      - name: Comment on PR — coverage package count mismatch
        if: failure() && env.COVERAGE_COUNT_MISMATCH == 'true' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-test
          append: true
          path: '/tmp/coverage-mismatch-report.md'

      # ── 13. Upload coverage report artifact ───────────────
      - name: Upload Coverage Report
        if: env.required_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Coverage Report
          path: '${{ env.COVERAGE_REPORT_DIR }}'
          retention-days: 7
          if-no-files-found: warn

      # ── 14. Generate coverage table ────────────────────────
      - name: Generate Coverage Table
        if: env.required_tests == 'true'
        uses: IngSoft-DA2/workflows@v1.5
        with:
          filename: '${{ env.COVERAGE_REPORT_DIR }}/Cobertura.xml'
          threshold: 90

      # ── 15. Job summary ────────────────────────────────────
      - name: Write job summary
        if: always()
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          {
            echo "## ${ICON} Test"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Solution** | \`${{ env.FULL_SOLUTION_PATH }}\` |"
            echo "| **Status** | ${STATUS} |"
            echo "| **Runner** | \`${{ runner.os }}\` |"
            echo "| **Triggered by** | \`${{ github.event_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "coverage-table.md" ]]; then
            cat coverage-table.md >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 16. PR comment — coverage table ───────────────────
      - name: Add Coverage Table as PR Comment
        if: always() && hashFiles('coverage-table.md') != '' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-test
          recreate: true
          path: 'coverage-table.md'

      # ── 17. PR comment — coverage artifact info ────────────
      - name: Comment Coverage Artifact Info as PR Comment
        if: always() && github.event_name == 'pull_request' && env.required_tests == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-test
          append: true
          message: |
            📊 **Coverage Report Available**
            The full code coverage report is attached as an artifact for download [here](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            **How to use:**
            1. Download the "Coverage Report" artifact from this PR (see the Artifacts section below).
            2. Unzip the artifact.
            3. Open `index.html` in your browser.
            4. Inspect the coverage results interactively.

            _This artifact contains a full HTML report generated by the test suite._

      # ── 18. PR comment — success ───────────────────────────
      - name: Comment on PR — tests passed
        if: success() && github.event_name == 'pull_request' && env.required_tests == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-test
          append: true
          message: |
            ## ✅ All tests passed

            No test failures found in `${{ env.FULL_SOLUTION_PATH }}`.

      # ── 19. PR comment — missing coverage report ──────────
      - name: Add Missing Test as PR Comment
        if: always() && hashFiles('coverage-table.md') == '' && github.event_name == 'pull_request' && env.required_tests == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-test
          append: true
          message: '⚠️ Code coverage report not found. Tests required.'
