name: 'Generate Clean Code Analysis Table'
description: 'Parses format analysis report and creates a Markdown summary.'
author: 'Daniel Acevedo'
inputs:
  filename:
    description: 'Path to format-report.json'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Generate Clean Code Analysis Report
      shell: bash
      run: |
        python3 <<EOF
        import json
        import sys
        import os

        filename = "${{ inputs.filename }}"

        if not os.path.isfile(filename):
            print(f"❌ File not found: {filename}", file=sys.stderr)
            sys.exit(1)

        with open(filename, 'r', encoding='utf-8') as f:
            data = json.load(f)

        issue_count = 0
        table = "| File | Line | Diagnostic | Description |\n"
        table += "|------|------|------------|-------------|\n"

        for entry in data:
            file_path = entry.get("FileName", "Unknown file")
            changes = entry.get("FileChanges", [])
            for change in changes:
                line = change.get("LineNumber", "-")
                diagnostic_id = change.get("DiagnosticId", "-")
                description = change.get("FormatDescription", "-")
                table += f"| `{file_path}` | {line} | `{diagnostic_id}` | {description} |\n"
                issue_count += 1

        table += "|------|------|------------|-------------|\n"
        table += f"| **Total** | | | **{'✅ 0' if issue_count == 0 else f'❌ {issue_count}'}** |\n"

        if issue_count == 0:
            table += "\n*Awesome! No code analysis issues found. 🚀*\n"
        else:
            table += "\n*Please fix the issues above before merging.*\n"

        summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "")
        if summary_file:
            with open(summary_file, "a", encoding="utf-8") as f:
                f.write("\n## 🔍 Clean Code Analysis\n\n")
                f.write(table)

        print("\n" + table)

        if issue_count > 0:
            print(f"❌ Clean code analysis failed with {issue_count} issues.", file=sys.stderr)
            sys.exit(1)
        else:
            print("✅ Clean code analysis passed.")
        EOF
